version: 2

models:
  - name: dim_customers
    description: Customer dimension with order history stats
    columns:
      - name: customer_key
        description: Primary key (matches customer_id from orders)
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: Unique identifier for the actual person
        tests:
          - not_null
      - name: customer_state
        description: Two-letter state code
        tests:
          - not_null

  - name: dim_products
    description: Product dimension with category names in English and Portuguese
    columns:
      - name: product_key
        description: Primary key (product_id)
        tests:
          - unique
          - not_null
      - name: product_category_name_en
        description: Product category in English
        tests:
          - not_null

  - name: dim_dates
    description: Date dimension spanning the full order date range
    columns:
      - name: date_key
        description: Calendar date (primary key)
        tests:
          - unique
          - not_null
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null

  - name: fact_orders
    description: "Grain: one row per order line item with price, freight, and delivery info"
    columns:
      - name: order_id
        description: Order identifier
        tests:
          - not_null
      - name: order_item_id
        description: Line item number within the order
        tests:
          - not_null
      - name: customer_key
        description: Foreign key to dim_customers
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        description: Foreign key to dim_products
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: order_date_key
        description: Foreign key to dim_dates
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: price
        description: Item price in BRL
        tests:
          - not_null

  - name: fact_daily_sales
    description: Pre-aggregated daily sales metrics (excludes canceled orders)
    columns:
      - name: sale_date_key
        description: Calendar date (foreign key to dim_dates)
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: total_orders
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null
